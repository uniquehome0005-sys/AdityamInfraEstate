<div class="widget-box-2 mb-20">
    <h5 class="title">Floors Plans</h5>
    <div class="box-radio-check">
        <div class="text-btn mb-16">Enable Floor Plan:</div>
        <fieldset class="fieldset-radio">
            <input type="radio" name="floor_enable" class="tf-checkbox style-1" id="floor_enable" checked>
            <label for="floor_enable" class="text-radio">Enable</label>
        </fieldset>
        <fieldset class="fieldset-radio">
            <input type="radio" class="tf-checkbox style-1" name="floor_enable" id="floor_disable">
            <label for="floor_disable">Disable</label>
        </fieldset>
    </div>
    <div class="floor-wrapper">
    <div class="box-floor-property file-delete mb-4">
        <div class="top d-flex justify-content-between align-items-center">
            <h6>Floor 1:</h6>
            <a href="#" class="remove-file"><span class="icon icon-close2"></span></a>
        </div>
        <fieldset class="box box-fieldset">
            <label>Floor Name:</label>
            <input type="text" name="floor_name" class="form-control style-1">
        </fieldset>
        <div class="grid-2 box gap-30">
            <fieldset class="box-fieldset">
                <label>Floor Price (Only Digits):</label>
                <input type="text" name="floor_price" class="form-control style-1">
            </fieldset>
            <fieldset class="box-fieldset">
                <label>Price Postfix:</label>
                <input type="text" name="floor_price_postfix" class="form-control style-1">
            </fieldset>
        </div>
        <div class="grid-2 box gap-30">
            <fieldset class="box-fieldset">
                <label>Floor Size (Only Digits):</label>
                <input type="text" name="floor_size" class="form-control style-1">
            </fieldset>
            <fieldset class="box-fieldset">
                <label>Size Postfix:</label>
                <input type="text" name="floor_size_postfix" class="form-control style-1">
            </fieldset>
        </div>
        <div class="grid-2 box gap-30">
            <fieldset class="box-fieldset">
                <label>Bedrooms:</label>
                <input type="text" name="floor_bedrooms" class="form-control style-1">
            </fieldset>
            <fieldset class="box-fieldset">
                <label>Bathrooms:</label>
                <input type="text" name="floor_bathrooms" class="form-control style-1">
            </fieldset>
        </div>
        <div class="grid-2 box gap-30">
            <fieldset class="box-fieldset">
                <label>Floor Image:</label>
                <div class="box-floor-img uploadfile">
                    <div class="btn-upload tf-btn primary">
                        Choose File
                        <input type="file" name="floor_image" class="ip-file">
                    </div>
                    <p class="file-name">Or drop file here to upload</p>
                </div>
            </fieldset>
            <fieldset class="box-fieldset">
                <label>Description:</label>
                <textarea name="floor_description" class="textarea"></textarea>
            </fieldset>
        </div>
    </div>
    </div>
    <div class="text-center box-floor-property-add-button">
        <a href="#" class="btn-add-floor" id=""><span class="icon icon-plus"></span></a>
    </div>
</div>

<script>

    document.addEventListener("DOMContentLoaded", function () {

        const addBtn = document.querySelector(".btn-add-floor");
        const wrapper = document.querySelector(".floor-wrapper");
        const maxFloors = 5;
    
        function getFloorCount() {
            return wrapper.querySelectorAll(".box-floor-property").length;
        }
    
        function resetFloorIndexes() {
            wrapper.querySelectorAll(".box-floor-property").forEach((floor, index) => {
                const title = floor.querySelector("h6");
                if (title) title.textContent = `Floor ${index + 1}:`;
            });
        }
    
        addBtn.addEventListener("click", function (e) {
            e.preventDefault();
    
            const firstFloor = wrapper.querySelector(".box-floor-property");
    
            if (!firstFloor) return; // ✅ prevents crash
    
            if (getFloorCount() >= maxFloors) {
                alert("Maximum 5 floor plans allowed.");
                return;
            }
    
            const clone = firstFloor.cloneNode(true);
    
            clone.querySelectorAll("input").forEach(i => i.value = "");
            clone.querySelectorAll("textarea").forEach(t => t.value = "");
    
            const fileText = clone.querySelector(".file-name");
            if (fileText) fileText.textContent = "Or drop file here to upload";
    
            wrapper.appendChild(clone);
    
            resetFloorIndexes();
        });
    });

    document.addEventListener("click", function (e) {
        if (e.target.closest(".remove-file")) {
            e.preventDefault();
    
            const floor = e.target.closest(".box-floor-property");
            if (floor) floor.remove();
        }
    });
    

    document.addEventListener("DOMContentLoaded", function () {
        const enableRadio = document.getElementById("floor_enable");
        const disableRadio = document.getElementById("floor_disable");
        const floorBoxes = document.querySelectorAll(".box-floor-property");
        const floorAddBtn = document.querySelector(".box-floor-property-add-button");
    
        function toggleFloorSection() {
            const hide = document.getElementById("floor_disable").checked;
        
            floorBoxes.forEach(box => {
                box.style.display = hide ? "none" : "block";
            });
        
            floorAddBtn.style.display = hide ? "none" : "block";
        }
    
        enableRadio.addEventListener("change", toggleFloorSection);
        disableRadio.addEventListener("change", toggleFloorSection);
    
        // initial state
        toggleFloorSection();
    });

    function getFloorPlans() {
        const isEnabled = document.getElementById("floor_enable").checked;
        if (!isEnabled) return [];
    
        const floors = [];
    
        document.querySelectorAll(".box-floor-property").forEach(floor => {
            floors.push({
                name: floor.querySelector("input[name='floor_name']")?.value || "",
                price: floor.querySelector("input[name='floor_price']")?.value || "",
                price_postfix: floor.querySelector("input[name='floor_price_postfix']")?.value || "",
                size: floor.querySelector("input[name='floor_size']")?.value || "",
                size_postfix: floor.querySelector("input[name='floor_size_postfix']")?.value || "",
                bedrooms: floor.querySelector("input[name='floor_bedrooms']")?.value || "",
                bathrooms: floor.querySelector("input[name='floor_bathrooms']")?.value || "",
                description: floor.querySelector("textarea[name='floor_description']")?.value || "",
            });
        });
    
        return floors;
    }
</script>
