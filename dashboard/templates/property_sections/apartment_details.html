<div id="apartment-fields" style="display:none;">
    <div class="widget-box-2 mb-20">
        <h5 class="title">Tell us about your property</h5>
        <div class="box grid-2 gap-30">
            <fieldset class="box-fieldset">
                <label>Carpet Area</label>
                <input type="number" name="carpet_area" id="carpet_area" class="form-control" placeholder="Carpet Area">
            </fieldset>
            <fieldset class="box-fieldset">
                <label>Area Unit</label>
                <div class="nice-select" id="carpet_area_unit" tabindex="0"><span class="current">sq.ft.</span>
                    <ul class="list">
                        <li data-value="sqft" class="option selected">sq.ft.</li>
                        <li data-value="sqyard" class="option">sq.yards</li>
                        <li data-value="sqm" class="option">sq.m.</li>
                        <li data-value="acre" class="option">acre</li>
                        <li data-value="marla" class="option">marla</li>
                        <li data-value="cents" class="option">cents</li>
                    </ul>
                </div>
            </fieldset>
        </div>
        <div id="extra-areas"></div>
        <button type="button" id="add-area-btn" class="tf-btn primary" style="margin-top:15px;">
            + Add More Area
        </button>
    </div>
    <div class="widget-box-2 mb-20">
        <h5 class="title">Room Details</h5>
        <div class="box grid-3 gap-30">
            <fieldset class="box-fieldset">
                <label>No of Bedrooms</label>
                <input type="number" name="bedrooms" class="form-control" placeholder="No of Bedrooms" name="bedrooms">
            </fieldset>
            <fieldset class="box-fieldset">
                <label>No of Bathrooms</label>
                <input type="number" name="bathrooms" class="form-control" placeholder="No of Bathrooms" name="bathrooms">
            </fieldset>
            <fieldset class="box-fieldset">
                <label>No of Balconies</label>
                <input type="number" name="balconies" class="form-control" placeholder="No of Balconies" name="balconies">
            </fieldset>
        </div>
    </div>
    <div class="widget-box-2 mb-20">
        <h5 class="title">Floor Details</h5>
        <div class="box grid-2 gap-30">
            <fieldset class="box-fieldset">
                <label>Total Floors</label>
                <input type="number" name="total_floors" class="form-control" placeholder="Total Floors" name="total_floors">
            </fieldset>
            <fieldset id='property-on-floor' class="box-fieldset" style="display:none;">
                <label>Property on Floor</label>
                <div class="nice-select" tabindex="0"><span class="current">Basement</span>
                    <ul class="list">
                        <li data-value="basement" class="option selected">Basement</li>
                        <li data-value="ground" class="option">Ground</li>
                        <li data-value="1" class="option">1</li>
                        <li data-value="2" class="option">2</li>
                        <li data-value="3" class="option">3</li>
                        <li data-value="4" class="option">4</li>
                        <li data-value="5" class="option">5</li>
                        <li data-value="6" class="option">6</li>
                        <li data-value="7" class="option">7</li>
                        <li data-value="8" class="option">8</li>
                        <li data-value="9" class="option">9</li>
                        <li data-value="10" class="option">10</li>
                        <li data-value="11" class="option">11</li>
                        <li data-value="12" class="option">12</li>
                        <li data-value="13" class="option">13</li>
                        <li data-value="14" class="option">14</li>
                        <li data-value="15" class="option">15</li>
                        <li data-value="16" class="option">16</li>
                        <li data-value="17" class="option">17</li>
                        <li data-value="18" class="option">18</li>
                        <li data-value="19" class="option">19</li>
                        <li data-value="20" class="option">20</li>
                    </ul>
                </div>
            </fieldset>
        </div>
    </div>
</div>
