{% include "property_sections/apartment_details.html" %}
{% include "property_sections/plot_details.html" %}
{% include "property_sections/availability_ownership.html" %}

<script>
    document.addEventListener("DOMContentLoaded", () => {
    
        // ==========================
        // OPTION GROUP HANDLER
        // ==========================
        document.querySelectorAll(".option-group").forEach(group => {
    
            const options = group.querySelectorAll(".dates");
    
            options.forEach(option => {
    
                option.addEventListener("click", function () {
    
                    options.forEach(el =>
                        el.classList.remove("active")
                    );
    
                    this.classList.add("active");
    
                    const value = this.dataset.value;
    
                    const hiddenInput =
                        group.parentElement.parentElement.querySelector(
                            'input[type="hidden"]'
                        );
    
                    if (hiddenInput) {
                        hiddenInput.value = value;
                    }
    
                    // Construction toggle
                    if (group.id === "construction_done") {
    
                        const constructionBox =
                            document.getElementById("construction-types");
    
                        constructionBox.style.display =
                            value === "yes"
                                ? "block"
                                : "none";
                    }
                });
            });
        });
    
        // ==========================
        // ELEMENTS
        // ==========================
        const lengthInput =
            document.getElementById("length_area");
    
        const widthInput =
            document.getElementById("width_area");
    
        const areaResult =
            document.getElementById("areaResult");
    
        const plotAreaInput =
            document.getElementById("plot_area");
    
        const carpetAreaInput =
            document.getElementById("carpet_area");
    
        const pricePerUnitInput =
            document.getElementById("price_per_unit");
    
        const totalPriceInput =
            document.getElementById("price");
    
        const pricePerSqftInput =
            document.getElementById("price_per_sqft");
    
        const plotFields =
            document.getElementById("plot-fields");
    
        const apartmentFields =
            document.getElementById("apartment-fields");
    
        const propertyOnFloor =
            document.getElementById("property-on-floor");
    
        const addBtn =
            document.getElementById("add-area-btn");
    
        const container =
            document.getElementById("extra-areas");
    
        // ==========================
        // AREA OPTIONS
        // ==========================
        const areaOptions = [
            {
                label: "Built-up Area",
                name: "builtup_area",
                unit: "builtup_area_unit"
            },
            {
                label: "Super Built-up Area",
                name: "super_area",
                unit: "super_area_unit"
            }
        ];
    
        let index = 0;
    
        // ==========================
        // UNIT CONVERSION
        // ==========================
        const unitConversion = {
            sqft: 1,
            sqyard: 9,
            sqm: 10.7639,
            acre: 43560,
            marla: 272.25,
            cents: 435.6
        };
    
        // ==========================
        // GET SELECTED UNIT
        // ==========================
        function getSelectedUnit(selector = "#area_unit") {
    
            return document.querySelector(
                `${selector} .option.selected`
            )?.dataset.value || "sqft";
        }
    
        // ==========================
        // UNIT LABEL
        // ==========================
        function getUnitLabel(unit) {
    
            switch (unit) {
    
                case "sqft":
                    return "sq.ft";
    
                case "sqyard":
                    return "sq.yards";
    
                case "sqm":
                    return "sq.m";
    
                case "acre":
                    return "acres";
    
                case "marla":
                    return "marla";
    
                case "cents":
                    return "cents";
    
                default:
                    return "sq.ft";
            }
        }
    
        // ==========================
        // CONVERT AREA
        // ==========================
        function convertArea(areaSqft, unit) {
    
            switch (unit) {
    
                case "sqft":
                    return areaSqft;
    
                case "sqyard":
                    return areaSqft / 9;
    
                case "sqm":
                    return areaSqft / 10.7639;
    
                case "acre":
                    return areaSqft / 43560;
    
                case "marla":
                    return areaSqft / 272.25;
    
                case "cents":
                    return areaSqft / 435.6;
    
                default:
                    return areaSqft;
            }
        }
    
        // ==========================
        // TOGGLE PROPERTY FIELDS
        // ==========================
        function togglePlotFields(type) {
    
            if (!type) {
    
                plotFields.style.display = "none";
                apartmentFields.style.display = "none";
                propertyOnFloor.style.display = "none";
    
                return;
            }
    
            type = type.toLowerCase();
    
            plotFields.style.display = "none";
            apartmentFields.style.display = "none";
            propertyOnFloor.style.display = "none";
    
            // Plot / Land
            if (
                type.includes("plot") ||
                type.includes("land")
            ) {
    
                plotFields.style.display = "block";
            }
    
            // Apartment / Flat / Villa
            else if (
                type.includes("apartment") ||
                type.includes("flat") ||
                type.includes("villa")
            ) {
    
                apartmentFields.style.display = "block";
    
                if (
                    type.includes("apartment") ||
                    type.includes("flat")
                ) {
    
                    propertyOnFloor.style.display =
                        "block";
                }
            }
        }
    
        // ==========================
        // CALCULATE AREA
        // ==========================
        function calculateArea() {
    
            const length =
                parseFloat(lengthInput?.value) || 0;
    
            const width =
                parseFloat(widthInput?.value) || 0;
    
            if (!length || !width) {
    
                if (areaResult) {
                    areaResult.innerHTML = "";
                }
    
                if (plotAreaInput) {
                    plotAreaInput.value = "";
                }
    
                return;
            }
    
            const unit =
                getSelectedUnit("#area_unit");
    
            // Base area in sqft
            const areaSqft = length * width;
    
            // Converted area
            const convertedArea =
                convertArea(areaSqft, unit);
    
            // Display area
            if (areaResult) {
    
                areaResult.innerHTML = `
                    <strong>Area:</strong>
                    ${convertedArea.toFixed(2)}
                    ${getUnitLabel(unit)}
                `;
            }
    
            // Set hidden/input value
            if (plotAreaInput) {
    
                plotAreaInput.value =
                    `${convertedArea.toFixed(2)}
                    ${getUnitLabel(unit)}`;
            }
        }
    
        // ==========================
        // CALCULATE PRICE
        // ==========================
        function calculatePrice() {
    
            let area = 0;
    
            // If Plot / Land selected
            const isPlotVisible =
                plotFields.style.display === "block";
    
            if (isPlotVisible) {
    
                const length =
                    parseFloat(lengthInput?.value) || 0;
    
                const width =
                    parseFloat(widthInput?.value) || 0;
    
                area = length * width;
    
            } else {
    
                // Apartment/Villa
                area =
                    parseFloat(
                        carpetAreaInput?.value
                    ) || 0;
            }
    
            // Price per unit
            const pricePerUnit =
                parseFloat(
                    pricePerUnitInput?.value
                ) || 0;
    
            // Total Price
            const total =
                area * pricePerUnit;
    
            // Set total price
            if (totalPriceInput) {
    
                totalPriceInput.value =
                    Math.round(total);
            }
    
            // Price per sqft
            if (
                pricePerSqftInput &&
                area > 0
            ) {
    
                pricePerSqftInput.value =
                    (total / area).toFixed(2);
            }
        }
    
        // ==========================
        // INPUT EVENTS
        // ==========================
        if (lengthInput) {
    
            lengthInput.addEventListener(
                "input",
                () => {
    
                    calculateArea();
                    calculatePrice();
                }
            );
        }
    
        if (widthInput) {
    
            widthInput.addEventListener(
                "input",
                () => {
    
                    calculateArea();
                    calculatePrice();
                }
            );
        }
    
        if (carpetAreaInput) {
    
            carpetAreaInput.addEventListener(
                "input",
                calculatePrice
            );
        }
    
        if (pricePerUnitInput) {
    
            pricePerUnitInput.addEventListener(
                "input",
                calculatePrice
            );
        }
    
        // ==========================
        // NICE SELECT HANDLER
        // ==========================
        document.querySelectorAll(".nice-select")
            .forEach(select => {
    
                select.querySelectorAll(".option")
                    .forEach(option => {
    
                        option.addEventListener(
                            "click",
                            function () {
    
                                // Remove selected
                                select.querySelectorAll(".option")
                                    .forEach(o =>
                                        o.classList.remove(
                                            "selected"
                                        )
                                    );
    
                                // Add selected
                                this.classList.add(
                                    "selected"
                                );
    
                                // Update current text
                                const current =
                                    select.querySelector(
                                        ".current"
                                    );
    
                                if (current) {
    
                                    current.innerText =
                                        this.innerText;
                                }
    
                                calculateArea();
                                calculatePrice();
                            }
                        );
                    });
            });
    
        // ==========================
        // ADD EXTRA AREA FIELDS
        // ==========================
        if (addBtn) {
    
            addBtn.addEventListener("click", () => {
    
                if (
                    index >= areaOptions.length
                ) {
    
                    addBtn.disabled = true;
    
                    addBtn.innerText =
                        "All Areas Added";
    
                    return;
                }
    
                const area =
                    areaOptions[index];
    
                const html = `
                    <div class="box grid-2 gap-30">
    
                        <fieldset class="box-fieldset">
    
                            <label>
                                ${area.label}
                            </label>
    
                            <input
                                type="number"
                                name="${area.name}"
                                class="form-control"
                            >
    
                        </fieldset>
    
                        <fieldset class="box-fieldset">
    
                            <label>
                                Area Unit
                            </label>
    
                            <div class="nice-select"
                                 tabindex="0">
    
                                <span class="current">
                                    sq.ft.
                                </span>
    
                                <ul class="list">
    
                                    <li data-value="sqft"
                                        class="option selected">
                                        sq.ft.
                                    </li>
    
                                    <li data-value="sqyard"
                                        class="option">
                                        sq.yards
                                    </li>
    
                                    <li data-value="sqm"
                                        class="option">
                                        sq.m.
                                    </li>
    
                                    <li data-value="acre"
                                        class="option">
                                        acre
                                    </li>
    
                                    <li data-value="marla"
                                        class="option">
                                        marla
                                    </li>
    
                                    <li data-value="cents"
                                        class="option">
                                        cents
                                    </li>
    
                                </ul>
                            </div>
    
                        </fieldset>
    
                    </div>
                `;
    
                container.insertAdjacentHTML(
                    "beforeend",
                    html
                );
    
                index++;
            });
        }
    
        // ==========================
        // GLOBAL ACCESS
        // ==========================
        window.togglePlotFields =
            togglePlotFields;
    
    });
</script>
